services:
  api:
    image: "__API_IMAGE__"
    container_name: programmers-badge-api
    environment:
      PORT: 3000
      DATABASE_PATH: /data/programmers-badge.sqlite
      BADGE_OUTPUT_DIR: /data/badges
      PUBLIC_BASE_URL: "__PUBLIC_BASE_URL__"
      PUBLIC_BADGE_PATH_PREFIX: "__PUBLIC_BADGE_PATH_PREFIX__"
    ports:
      - "__API_PORT__:3000"
    volumes:
      - badge-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  badge-data:
