name: Deploy API

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-api.yml"
      - ".github/release.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "deploy/**"
      - "apps/api/**"
      - "packages/badge-core/**"
      - "packages/shared-types/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 10.28.2

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verify
        run: pnpm verify

  build:
    name: Build and push API image
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/programmers-badge-api"
          echo "image_name=${image}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_ref }}
          labels: |
            org.opencontainers.image.title=programmers-badge-api
            org.opencontainers.image.description=PROGRAMMERS-BADGE-V2 API image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to NAS
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          REPO_DIR: ${{ secrets.NAS_REPO_DIR }}
          API_PORT: ${{ secrets.NAS_API_PORT }}
          SUDO_PASSWORD: ${{ secrets.NAS_PASSWORD }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          PUBLIC_BADGE_PATH_PREFIX: /badge
          API_IMAGE: ${{ needs.build.outputs.image_ref }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          request_pty: true
          envs: REPO_DIR,API_PORT,SUDO_PASSWORD,PUBLIC_BASE_URL,PUBLIC_BADGE_PATH_PREFIX,API_IMAGE,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN
          script: |
            set -eu

            if [ ! -d "${REPO_DIR}/.git" ]; then
              echo "NAS_REPO_DIR does not contain a git repository: ${REPO_DIR}" >&2
              echo "Clone the repository on the NAS once before using this workflow." >&2
              exit 1
            fi

            cd "${REPO_DIR}"
            git fetch origin master
            git checkout master
            git reset --hard origin/master

            cat <<EOF > .env.deploy
            API_IMAGE=${API_IMAGE}
            API_PORT=${API_PORT}
            PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
            PUBLIC_BADGE_PATH_PREFIX=${PUBLIC_BADGE_PATH_PREFIX}
            EOF

            if docker info >/dev/null 2>&1; then
              DOCKER_USE_SUDO=0
            elif printf '%s\n' "${SUDO_PASSWORD}" | sudo -S -p '' docker info >/dev/null 2>&1; then
              DOCKER_USE_SUDO=1
            else
              echo "Docker daemon is not accessible for NAS_USER. Grant docker access or sudo permissions." >&2
              exit 1
            fi

            if [ -n "${GHCR_PULL_USERNAME}" ] && [ -n "${GHCR_PULL_TOKEN}" ]; then
              if [ "${DOCKER_USE_SUDO}" = "1" ]; then
                printf '%s\n' "${SUDO_PASSWORD}" | sudo -S -p '' sh -c 'echo "$1" | docker login ghcr.io -u "$0" --password-stdin' "${GHCR_PULL_USERNAME}" "${GHCR_PULL_TOKEN}"
              else
                echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_PULL_USERNAME}" --password-stdin
              fi
            fi

            compose() {
              if docker compose version >/dev/null 2>&1; then
                if [ "${DOCKER_USE_SUDO}" = "1" ]; then
                  printf '%s\n' "${SUDO_PASSWORD}" | sudo -S -p '' docker compose "$@"
                else
                  docker compose "$@"
                fi
              else
                if [ "${DOCKER_USE_SUDO}" = "1" ]; then
                  printf '%s\n' "${SUDO_PASSWORD}" | sudo -S -p '' /usr/local/bin/docker-compose "$@"
                else
                  /usr/local/bin/docker-compose "$@"
                fi
              fi
            }

            compose -f deploy/docker-compose.deploy.yml --env-file .env.deploy pull
            compose -f deploy/docker-compose.deploy.yml --env-file .env.deploy up -d --remove-orphans

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/api/health" >/dev/null; then
                echo "Deployment health check passed"
                exit 0
              fi

              sleep 2
            done

            echo "Deployment health check failed" >&2
            exit 1
