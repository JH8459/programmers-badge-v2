name: Deploy API

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-api.yml"
      - "Dockerfile"
      - "docker-compose.api.yml"
      - "apps/api/package.json"
      - "apps/api/tsconfig*.json"
      - "apps/api/src/**"
      - "!apps/api/src/**/*.spec.ts"
      - "!apps/api/src/**/*.e2e-spec.ts"
      - "packages/badge-core/package.json"
      - "packages/badge-core/tsconfig*.json"
      - "packages/badge-core/src/**"
      - "!packages/badge-core/src/**/*.spec.ts"
      - "packages/shared-types/package.json"
      - "packages/shared-types/tsconfig*.json"
      - "packages/shared-types/src/**"
      - "!packages/shared-types/src/**/*.spec.ts"
      - "packages/config/tsconfig/**"
      - "tsconfig.base.json"
  workflow_dispatch:

concurrency:
  group: production-api-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 10.28.2
  DOCKER_IMAGE_NAME: programmers-badge-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify before API deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify API package
        run: |
          pnpm --filter @programmers-badge/shared-types build
          pnpm --filter @programmers-badge/badge-core build
          pnpm --filter @programmers-badge/api lint
          pnpm --filter @programmers-badge/api typecheck
          pnpm --filter @programmers-badge/api test
          pnpm --filter @programmers-badge/api test:e2e
          pnpm --filter @programmers-badge/api test:coverage
          pnpm --filter @programmers-badge/api build

  build:
    name: Build and push API image
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve API image metadata
        id: image
        shell: bash
        run: |
          api_image="${{ secrets.DOCKERHUB_USERNAME }}/${DOCKER_IMAGE_NAME}"
          echo "api_image_name=${api_image}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.api_image_name }}:latest
            ${{ steps.image.outputs.api_image_name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=programmers-badge-api
            org.opencontainers.image.description=PROGRAMMERS-BADGE-V2 API image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy API to NAS
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      API_PORT: ${{ vars.API_PORT || '5010' }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://api.programmers-badge.jh8459.com' }}
      ALLOWED_WEB_ORIGINS: ${{ vars.ALLOWED_WEB_ORIGINS || 'https://programmers-badge.jh8459.com' }}
      ALLOW_LOCALHOST_ORIGINS: ${{ vars.ALLOW_LOCALHOST_ORIGINS || 'false' }}
      ENABLE_SWAGGER: ${{ vars.ENABLE_SWAGGER || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Encode deploy compose
        id: compose
        shell: bash
        run: |
          echo "content=$(base64 < docker-compose.api.yml | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Sync deploy files on NAS
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_COMPOSE_B64: ${{ steps.compose.outputs.content }}
          NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
          API_PORT: ${{ env.API_PORT }}
          PUBLIC_BASE_URL: ${{ env.PUBLIC_BASE_URL }}
          ALLOWED_WEB_ORIGINS: ${{ env.ALLOWED_WEB_ORIGINS }}
          ALLOW_LOCALHOST_ORIGINS: ${{ env.ALLOW_LOCALHOST_ORIGINS }}
          ENABLE_SWAGGER: ${{ env.ENABLE_SWAGGER }}
          SWAGGER_USERNAME: ${{ secrets.SWAGGER_USERNAME }}
          SWAGGER_PASSWORD: ${{ secrets.SWAGGER_PASSWORD }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          envs: DEPLOY_COMPOSE_B64,NAS_DEPLOY_DIR,API_PORT,PUBLIC_BASE_URL,ALLOWED_WEB_ORIGINS,ALLOW_LOCALHOST_ORIGINS,ENABLE_SWAGGER,SWAGGER_USERNAME,SWAGGER_PASSWORD,DOCKER_IMAGE
          script: |
            set -eu

            mkdir -p "${NAS_DEPLOY_DIR}"
            printf '%s' "${DEPLOY_COMPOSE_B64}" | base64 -d > "${NAS_DEPLOY_DIR}/docker-compose.api.yml"

            API_PORT="${API_PORT:-5010}"
            PUBLIC_BASE_URL="${PUBLIC_BASE_URL:-https://api.programmers-badge.jh8459.com}"
            ALLOWED_WEB_ORIGINS="${ALLOWED_WEB_ORIGINS:-https://programmers-badge.jh8459.com}"
            ALLOW_LOCALHOST_ORIGINS="${ALLOW_LOCALHOST_ORIGINS:-false}"
            ENABLE_SWAGGER="${ENABLE_SWAGGER:-true}"

            cat <<EOF > "${NAS_DEPLOY_DIR}/.env.api.deploy"
            DOCKER_IMAGE=${DOCKER_IMAGE}
            API_PORT=${API_PORT}
            PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
            ALLOWED_WEB_ORIGINS=${ALLOWED_WEB_ORIGINS}
            ALLOW_LOCALHOST_ORIGINS=${ALLOW_LOCALHOST_ORIGINS}
            ENABLE_SWAGGER=${ENABLE_SWAGGER}
            SWAGGER_USERNAME=${SWAGGER_USERNAME}
            SWAGGER_PASSWORD=${SWAGGER_PASSWORD}
            EOF

      - name: Pull and restart API container
        uses: appleboy/ssh-action@v1.2.5
        env:
          NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
          API_PORT: ${{ env.API_PORT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          envs: NAS_DEPLOY_DIR,API_PORT,DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD
          script: |
            set -eu

            export PATH="/usr/local/bin:/usr/bin:/bin:${PATH}"

            DOCKER_BIN="$(command -v docker || true)"
            if [ -z "${DOCKER_BIN}" ] && [ -x "/usr/local/bin/docker" ]; then
              DOCKER_BIN="/usr/local/bin/docker"
            fi

            COMPOSE_STANDALONE="/usr/local/bin/docker-compose"
            COMPOSE_FILE="${NAS_DEPLOY_DIR}/docker-compose.api.yml"

            if [ -z "${DOCKER_BIN}" ]; then
              echo "docker binary not found on NAS" >&2
              exit 1
            fi

            cd "${NAS_DEPLOY_DIR}"

            docker_cmd() {
              "${DOCKER_BIN}" "$@"
            }

            compose_cmd() {
              if [ -x "${COMPOSE_STANDALONE}" ]; then
                "${COMPOSE_STANDALONE}" "$@"
              else
                docker_cmd compose "$@"
              fi
            }

            set -a
            . ./.env.api.deploy
            set +a
            API_PORT="${API_PORT:-5010}"

            echo "${DOCKERHUB_PASSWORD}" | docker_cmd login -u "${DOCKERHUB_USERNAME}" --password-stdin
            compose_cmd -f "${COMPOSE_FILE}" pull api
            compose_cmd -f "${COMPOSE_FILE}" up -d --no-deps api

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/api/health" >/dev/null; then
                echo "API deployment health check passed"
                exit 0
              fi

              sleep 2
            done

            echo "API deployment health check failed" >&2
            exit 1
