name: Deploy API

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-api.yml"
      - ".github/release.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.deploy.yml"
      - "deploy/**"
      - "apps/api/**"
      - "packages/badge-core/**"
      - "packages/shared-types/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 10.28.2
  DOCKER_IMAGE_NAME: programmers-badge-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verify
        run: pnpm verify

  build:
    name: Build and push API image
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/${DOCKER_IMAGE_NAME}"
          echo "image_name=${image}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=programmers-badge-api
            org.opencontainers.image.description=PROGRAMMERS-BADGE-V2 API image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to NAS
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Encode deploy compose
        id: compose
        shell: bash
        run: |
          echo "content=$(base64 < docker-compose.deploy.yml | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Sync deploy files on NAS
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_COMPOSE_B64: ${{ steps.compose.outputs.content }}
          NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
          API_PORT: ${{ secrets.NAS_API_PORT }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          envs: DEPLOY_COMPOSE_B64,NAS_DEPLOY_DIR,API_PORT,PUBLIC_BASE_URL,DOCKER_IMAGE
          script: |
            set -eu

            mkdir -p "${NAS_DEPLOY_DIR}"
            printf '%s' "${DEPLOY_COMPOSE_B64}" | base64 -d > "${NAS_DEPLOY_DIR}/docker-compose.deploy.yml"

            cat <<EOF > "${NAS_DEPLOY_DIR}/.env.deploy"
            DOCKER_IMAGE=${DOCKER_IMAGE}
            API_PORT=${API_PORT}
            PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
            EOF

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.5
        env:
          NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
          API_PORT: ${{ secrets.NAS_API_PORT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          envs: NAS_DEPLOY_DIR,API_PORT,DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD
          script: |
            set -eu

            export PATH="/usr/local/bin:/usr/bin:/bin:${PATH}"

            DOCKER_BIN="$(command -v docker || true)"
            if [ -z "${DOCKER_BIN}" ] && [ -x "/usr/local/bin/docker" ]; then
              DOCKER_BIN="/usr/local/bin/docker"
            fi

            COMPOSE_STANDALONE="/usr/local/bin/docker-compose"
            COMPOSE_FILE="${NAS_DEPLOY_DIR}/docker-compose.deploy.yml"

            if [ -z "${DOCKER_BIN}" ]; then
              echo "docker binary not found on NAS" >&2
              exit 1
            fi

            cd "${NAS_DEPLOY_DIR}"

            docker_cmd() {
              "${DOCKER_BIN}" "$@"
            }

            compose_cmd() {
              if [ -x "${COMPOSE_STANDALONE}" ]; then
                "${COMPOSE_STANDALONE}" "$@"
              else
                docker_cmd compose "$@"
              fi
            }

            set -a
            . ./.env.deploy
            set +a

            echo "${DOCKERHUB_PASSWORD}" | docker_cmd login -u "${DOCKERHUB_USERNAME}" --password-stdin
            compose_cmd -f "${COMPOSE_FILE}" pull
            compose_cmd -f "${COMPOSE_FILE}" up -d --remove-orphans

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/api/health" >/dev/null; then
                echo "Deployment health check passed"
                exit 0
              fi

              sleep 2
            done

            echo "Deployment health check failed" >&2
            exit 1
