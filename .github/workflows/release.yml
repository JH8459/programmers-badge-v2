name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (example: v0.2.0)
        required: true
        type: string
      target:
        description: Target branch or commit SHA
        required: false
        default: master
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ steps.release.outputs.tag }}"
            exit 0
          fi

          gh release create "${{ steps.release.outputs.tag }}" \
            --target "${{ steps.release.outputs.target }}" \
            --generate-notes \
            --latest
