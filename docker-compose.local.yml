services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: ${COMPOSE_PROJECT_NAME:-programmers-badge}-api
    command: ["pnpm", "--filter", "@programmers-badge/api", "dev"]
    environment:
      PORT: 3000
      DATABASE_PATH: /data/programmers-badge.sqlite
      BADGE_OUTPUT_DIR: /data/badges
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:${API_PORT:-5010}}
      PUBLIC_BADGE_PATH_PREFIX: /badge
      ALLOWED_WEB_ORIGINS: ${ALLOWED_WEB_ORIGINS:-}
      ALLOW_LOCALHOST_ORIGINS: ${ALLOW_LOCALHOST_ORIGINS:-true}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME:-local-swagger}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-local-swagger}
    ports:
      - "${API_PORT:-5010}:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/badge-core/src:/app/packages/badge-core/src
      - ./packages/shared-types/src:/app/packages/shared-types/src
      - badge-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: build
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-5010}}
    container_name: ${COMPOSE_PROJECT_NAME:-programmers-badge}-web
    command: ["pnpm", "--filter", "@programmers-badge/web", "dev"]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-5010}}
    ports:
      - "${WEB_PORT:-5020}:5173"
    volumes:
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/src:/app/apps/web/src
      - ./apps/extension/store-assets:/app/apps/extension/store-assets:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  badge-data:
