services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: programmers-badge-api
    environment:
      PORT: 3000
      DATABASE_PATH: /data/programmers-badge.sqlite
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - badge-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  badge-data:
